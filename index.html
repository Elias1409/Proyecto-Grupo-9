<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión – FinTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-hero">
        <div class="mark">
            <svg class="icon"><use href="assets/icons.svg#icon-bar-chart"></use></svg>
        </div>
        <h1>FinTrack</h1>
        <p>El registro claro de tus finanzas personales: movimientos, deudas y metas de ahorro en un solo lugar.</p>
        <ul class="value-props">
            <li>Registra tus movimientos.</li>
            <li>Controla tus deudas.</li>
            <li>Alcanza tus metas.</li>
        </ul>
    </div>

    <div class="auth-panel">
        <div class="auth-card">
            <div class="logo">FinTrack</div>
            <h2>Iniciar sesión</h2>
            <div class="sub">Ingresa con tu correo universitario</div>

            <form action="dashboard.html">
                <div class="form-group">
                    <label class="form-label">Correo Universitario</label>
                    <div class="control-icon">
                        <svg class="icon"><use href="assets/icons.svg#icon-mail"></use></svg>
                        <input type="email" class="form-control" placeholder="usuario@ufide.ac.cr" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <div class="control-icon">
                        <svg class="icon"><use href="assets/icons.svg#icon-lock"></use></svg>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full mt-2">
                    Ingresar al Sistema
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
