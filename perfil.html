<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil – FinTrack Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="brand">FinTrack</div>
            <span class="tagline">Finanzas personales</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <span class="nav-label">Principal</span>
                <a href="dashboard.html" class="nav-item"><span class="ni">🏠</span> Dashboard</a>
                <a href="transacciones.html" class="nav-item"><span class="ni">💱</span> Transacciones</a>
                <a href="deudas.html" class="nav-item"><span class="ni">💳</span> Deudas</a>
            </div>
            <div class="nav-section">
                <span class="nav-label">Análisis</span>
                <a href="reportes.html" class="nav-item"><span class="ni">📊</span> Reportes</a>
                <a href="metas.html" class="nav-item"><span class="ni">🎯</span> Metas de ahorro</a>
            </div>
            <div class="nav-section">
                <span class="nav-label">Cuenta</span>
                <a href="perfil.html" class="nav-item active"><span class="ni">👤</span> Mi perfil</a>
                <a href="index.html" class="nav-item"><span class="ni">🚪</span> Cerrar sesión</a>
            </div>
        </nav>
        <div class="sidebar-user">
            <div class="avatar">ER</div>
            <div>
                <div class="s-name">Elias Rodriguez</div>
                <div class="s-email">erodriguez60177@ufide.ac.cr</div>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <h2>Mi perfil</h2>
                <div class="sub">Administra la configuración de tu cuenta</div>
            </div>
        </div>

        <div class="grid-65">
            <!-- Datos del Usuario -->
            <div class="card">
                <div class="card-title">👤 Datos Personales</div>
                <form action="#">
                    <div class="form-group">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" value="Elias Rodriguez" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" value="erodriguez60177@ufide.ac.cr" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Moneda Principal</label>
                        <select class="form-control">
                            <option value="CRC">Colón Costarricense (₡)</option>
                            <option value="USD">Dólar (🇺🇸 $)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Actualizar Perfil</button>
                </form>
            </div>

            <!-- Cambio de contraseña básico -->
            <div class="card">
                <div class="card-title">🔒 Seguridad</div>
                <form action="#">
                    <div class="form-group">
                        <label class="form-label">Contraseña Actual</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nueva Contraseña</label>
                        <input type="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <button type="submit" class="btn btn-outline btn-full">Cambiar Contraseña</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
